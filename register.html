<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HarvestRise Hydroponics</title>
    <link rel="icon" type="image/png" href="assets/images/logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .auth-container {
            min-height: 100vh;
            position: relative;
        }

        .auth-form-wrapper {
            max-width: 500px;
            width: 100%;
        }

        .top-controls {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        @media (max-width: 576px) {
            .top-controls {
                position: static;
                justify-content: flex-end;
                padding: 12px 14px 0;
                gap: 12px;
                margin-bottom: 6px;
            }

            .auth-main-col {
                padding: 1.25rem !important;
            }

            .auth-form-wrapper {
                max-width: 100%;
            }

            .auth-form-wrapper .glass-card {
                padding: 2rem 1.25rem !important;
            }

            .signup-create-btn {
                white-space: nowrap;
            }

            .auth-continue-text {
                white-space: nowrap;
            }

            .signup-terms {
                margin: 0 auto;
                max-width: 280px;
                line-height: 1.5;
                text-align: center;
            }
        }
    </style>
</head>

<body class="bg-primary-bg">

    <div class="container-fluid p-0">
        <div class="top-controls">
            <button class="btn btn-outline-custom btn-sm d-flex align-items-center justify-content-center nav-toggle-btn" id="theme-toggle" title="Toggle Theme">
                <i class="bi bi-moon-stars"></i>
            </button>
            <button class="btn btn-outline-custom btn-sm d-flex align-items-center justify-content-center nav-toggle-btn" id="rtl-toggle" title="RTL">
                RTL
            </button>
        </div>

        <div class="row g-0 auth-container">
            <!-- Main Form Column -->
            <div class="col-12 d-flex flex-column align-items-center justify-content-center p-5 auth-main-col">


                <div class="auth-form-wrapper">
                    <div class="glass-card p-5">
                        <div class="text-center mb-4">
                            <a href="index.html"
                                class="navbar-brand d-flex align-items-center justify-content-center mb-3">
                                <img src="assets/images/logo.svg" alt="HarvestRise Logo" height="35" class="me-2" style="width: 35px;">
                                <span class="fw-bold text-white fs-4">Harvest<span class="text-gradient">Rise</span></span>
                            </a>
                        </div>
                        <h2 class="h4 mb-2 text-center">Subscribe Today</h2>
                        <p class="text-secondary text-sm text-center mb-5">Create your subscriber account in under 60 seconds.</p>

                        <form>
                            <div class="mb-4">
                                <label class="form-label text-secondary text-sm">First Name</label>
                                <input type="text"
                                    class="form-control bg-transparent border-color text-white shadow-none"
                                    placeholder="John">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary text-sm">Last Name</label>
                                <input type="text"
                                    class="form-control bg-transparent border-color text-white shadow-none"
                                    placeholder="Doe">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary text-sm">Email Address</label>
                                <input type="email"
                                    class="form-control bg-transparent border-color text-white shadow-none"
                                    placeholder="john@example.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary text-sm">Password</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-color text-secondary border-end-0"><i
                                            class="bi bi-lock"></i></span>
                                    <input type="password"
                                        class="form-control bg-transparent border-color text-white shadow-none border-start-0 border-end-0"
                                        placeholder="Min. 8 characters" id="password">
                                    <span
                                        class="input-group-text bg-transparent border-color text-secondary border-start-0 cursor-pointer toggle-password"
                                        style="cursor: pointer;">
                                        <i class="bi bi-eye"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary text-sm">Confirm Password</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-color text-secondary border-end-0"><i
                                            class="bi bi-lock"></i></span>
                                    <input type="password"
                                        class="form-control bg-transparent border-color text-white shadow-none border-start-0 border-end-0"
                                        placeholder="Confirm your password" id="confirm_password">
                                    <span
                                        class="input-group-text bg-transparent border-color text-secondary border-start-0 cursor-pointer toggle-password"
                                        style="cursor: pointer;">
                                        <i class="bi bi-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <p class="text-secondary text-xs text-center signup-terms">
                                    By signing up, you agree to our <a href="#" class="text-primary-accent">Terms of Service</a> and <a href="#" class="text-primary-accent">Privacy Policy</a>.
                                </p>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-4 signup-create-btn">Create Account</button>

                            <div class="text-center my-4">
                                <div class="d-flex align-items-center">
                                    <hr class="flex-grow-1 border-color">
                                    <span class="px-3 text-secondary text-xs auth-continue-text">OR CONTINUE WITH</span>
                                    <hr class="flex-grow-1 border-color">
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-4">
                                    <button type="button" class="btn btn-outline-custom w-100 py-2" title="Google"><i
                                             class="bi bi-google"></i></button>
                                </div>
                                <div class="col-4">
                                    <button type="button" class="btn btn-outline-custom w-100 py-2" title="Facebook"><i
                                             class="bi bi-facebook"></i></button>
                                </div>
                                <div class="col-4">
                                    <button type="button" class="btn btn-outline-custom w-100 py-2" title="Apple"><i
                                             class="bi bi-apple"></i></button>
                                </div>
                            </div>

                            <div class="text-center">
                                <p class="text-secondary text-sm">Already have an account? <a href="login.html"
                                        class="text-primary-accent text-decoration-none fw-bold">Sign in</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
